<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Leaflet Landkreisdaten</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    html, body { margin: 0; padding: 0; height: 100%; }
    #map { height: 100%; }

    /* ---------------- LOADING SCREEN ---------------- */
    #loading {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;

      background: rgba(255,255,255,0.9);
      z-index: 2000;

      display: flex;
      align-items: center;
      justify-content: center;

      font-family: Arial;
      font-size: 18px;
      font-weight: bold;
    }

    /* ---------------- CONTROLS ---------------- */
    .controls {
      position: absolute;
      top: 10px;
      left: 60px;
      z-index: 1000;
      background: white;
      padding: 12px;
      border-radius: 6px;
      box-shadow: 0 0 6px rgba(0,0,0,0.3);
      font-family: Arial;
      width: 320px;
    }

    .controls button {
      margin: 2px;
      font-size: 11px;
      padding: 4px 6px;
      cursor: pointer;
    }

    input[type="range"] { width: 100%; }

    /* ---------------- LEGEND ---------------- */
    .legend {
      position: absolute;
      bottom: 30px;
      right: 20px;
      z-index: 1000;
      background: white;
      padding: 10px;
      font-family: Arial;
      font-size: 12px;
      border-radius: 4px;
      box-shadow: 0 0 6px rgba(0,0,0,0.3);
      line-height: 18px;
    }

    .legend i {
      width: 18px;
      height: 18px;
      float: left;
      margin-right: 8px;
      opacity: 0.85;
    }
  </style>
</head>

<body>

<!-- LOADING SCREEN -->
<div id="loading">Daten werden geladen…</div>

<div class="controls">

  <label><b>Datum</b></label><br>

  <input type="date" id="datePicker"><br><br>

  <input type="range" id="dateSlider" min="0" max="0" value="0"><br>

  <div id="dateLabel" style="margin:6px 0;"></div>

  <div>
    <button onclick="shiftTime(-1)">◀ Tag</button>
    <button onclick="shiftTime(1)">Tag ▶</button>

    <br>

    <button onclick="shiftTime(-7)">◀ Woche</button>
    <button onclick="shiftTime(7)">Woche ▶</button>

    <br>

    <button onclick="shiftMonth(-1)">◀ Monat</button>
    <button onclick="shiftMonth(1)">Monat ▶</button>

    <br>

    <button onclick="shiftYear(-1)">◀ Jahr</button>
    <button onclick="shiftYear(1)">Jahr ▶</button>
  </div>

  <br>

  <label>Wert:</label>
  <select id="metricSelect">
    <option value="AnzahlFall">Fälle</option>
    <option value="AnzahlGenesen" selected>Genesen</option>
    <option value="AnzahlTodesfall">Todesfälle</option>
  </select>

</div>

<div id="map"></div>
<div class="legend" id="legend"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<script>

const map = L.map('map', {
  maxBounds: [[43.2, 5.8], [58.2, 15.5]],  // 🇩🇪 Deutschland grob
  maxBoundsViscosity: 1.0,
  minZoom: 6,
  maxZoom: 9
});

// Deutschland Fokus
map.setView([51.1, 10.4], 6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap'
}).addTo(map);

// --------------------
// GLOBALS
// --------------------

let geoLayer;
let dataByDate = {};
let dates = [];

let currentIndex = 0;
let currentMetric = 'AnzahlGenesen';

let globalMax = {
  AnzahlFall: 1,
  AnzahlGenesen: 1,
  AnzahlTodesfall: 1
};

// --------------------
// CONTROLS
// --------------------

const loading = document.getElementById('loading');
const slider = document.getElementById('dateSlider');
const picker = document.getElementById('datePicker');
const label = document.getElementById('dateLabel');

document.getElementById('metricSelect').addEventListener('change', e => {
  currentMetric = e.target.value;
  updateMap();
});

slider.addEventListener('input', e => {
  currentIndex = +e.target.value;
  syncControls();
  updateMap();
});

picker.addEventListener('change', e => {
  const idx = dates.indexOf(e.target.value);
  if (idx >= 0) setIndex(idx);
});

// --------------------
// NAVIGATION
// --------------------

function shiftTime(n) { setIndex(currentIndex + n); }

function shiftMonth(n) {
  const d = new Date(dates[currentIndex]);
  d.setMonth(d.getMonth() + n);
  jumpToDate(d);
}

function shiftYear(n) {
  const d = new Date(dates[currentIndex]);
  d.setFullYear(d.getFullYear() + n);
  jumpToDate(d);
}

function jumpToDate(dateObj) {
  const iso = dateObj.toISOString().slice(0,10);
  const idx = dates.findIndex(d => d >= iso);
  if (idx >= 0) setIndex(idx);
}

function setIndex(i) {
  currentIndex = Math.max(0, Math.min(dates.length - 1, i));
  syncControls();
  updateMap();
}

// --------------------
// SYNC UI
// --------------------

function syncControls() {
  const date = dates[currentIndex];
  slider.value = currentIndex;
  picker.value = date;
  label.innerText = date;
}

// --------------------
// LOAD
// --------------------

loadGeoJSON();
loadCSV();

// --------------------
// CSV
// --------------------

function loadCSV() {

  const today = new Date();
  const file = `Bereinigte_Daten_${today.getFullYear()}_${String(today.getMonth()+1).padStart(2,'0')}_${String(today.getDate()).padStart(2,'0')}.csv`;

  Papa.parse(file, {
    download: true,
    header: true,
    dynamicTyping: true,

    complete: res => {
      buildData(res.data);
      initUI();
      updateMap();

      // ✅ LOADING AUS
      loading.style.display = 'none';
    }
  });
}

// --------------------
// DATA
// --------------------

function buildData(rows) {

  dataByDate = {};

  rows.forEach(r => {
    if (!r.IdLandkreis || !r.Refdatum) return;

    const d = String(r.Refdatum).slice(0,10);
    const id = String(r.IdLandkreis);

    if (!dataByDate[d]) dataByDate[d] = {};
    if (!dataByDate[d][id]) {
      dataByDate[d][id] = {
        AnzahlFall: 0,
        AnzahlTodesfall: 0,
        AnzahlGenesen: 0
      };
    }

    dataByDate[d][id].AnzahlFall += r.AnzahlFall || 0;
    dataByDate[d][id].AnzahlTodesfall += r.AnzahlTodesfall || 0;
    dataByDate[d][id].AnzahlGenesen += r.AnzahlGenesen || 0;
  });

  dates = Object.keys(dataByDate).sort();

  for (const d of dates) {
    for (const m of Object.keys(globalMax)) {
      globalMax[m] = Math.max(
        globalMax[m],
        ...Object.values(dataByDate[d]).map(v => v[m] || 0)
      );
    }
  }
}

// --------------------
// INIT UI
// --------------------

function initUI() {
  slider.max = dates.length - 1;
  currentIndex = 0;
  syncControls();
}

// --------------------
// GEOJSON
// --------------------

function loadGeoJSON() {

  fetch('./GEOJson/VG250_KRS.json')
    .then(r => r.json())
    .then(g => {

      geoLayer = L.geoJSON(g, {
        style: styleFeature,
        onEachFeature
      }).addTo(map);

      map.fitBounds(geoLayer.getBounds());
    });
}

// --------------------
// ID
// --------------------

function getCountyId(f) {
  let a = String(f.properties.AGS_0 || '');
  a = a.replace(/^0+/, '');
  return a.slice(0, -3);
}

// --------------------
// COLOR
// --------------------

function getColor(value) {

  const max = globalMax[currentMetric];

  const t = Math.log((value || 0) + 1) / Math.log(max + 1);

  return `hsl(${(1 - t) * 240}, 80%, 50%)`;
}

// --------------------
// STYLE
// --------------------

function styleFeature(feature) {

  const id = getCountyId(feature);
  const date = dates[currentIndex];

  const val = dataByDate[date]?.[id]?.[currentMetric] ?? 0;

  return {
    fillColor: getColor(val),
    weight: 1,
    color: '#fff',
    fillOpacity: 0.75
  };
}

// --------------------
// UPDATE
// --------------------

function updateMap() {

  if (!dates.length) return;

  syncControls();

  if (geoLayer) {
    geoLayer.setStyle(styleFeature);
  }

  updateLegend();
}

// --------------------
// HOVER
// --------------------

function onEachFeature(feature, layer) {

  layer.on({

    mouseover: e => {

      const id = getCountyId(feature);
      const date = dates[currentIndex];

      const d = dataByDate[date]?.[id];

      e.target.bindTooltip(
        `<b>${feature.properties.GEN}</b><br>${currentMetric}: ${d?.[currentMetric] || 0}`,
        { sticky: true }
      ).openTooltip();
    },

    mouseout: e => {
      geoLayer.resetStyle(e.target);
      e.target.closeTooltip();
    }
  });
}

// --------------------
// LEGEND
// --------------------

function updateLegend() {

  const legend = document.getElementById('legend');
  const max = globalMax[currentMetric];

  let html = `<b>${currentMetric}</b><br>`;

  const steps = 6;

  for (let i = 0; i <= steps; i++) {

    const t = i / steps;
    const value = Math.exp(t * Math.log(max + 1)) - 1;

    const color = `hsl(${(1 - t) * 240}, 80%, 50%)`;

    html += `
      <i style="background:${color}"></i>
      ${Math.round(value)}<br>
    `;
  }

  legend.innerHTML = html;
}

</script>

</body>
</html>
